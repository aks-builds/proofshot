name: "cliproof CodeQL config"

# Use the full security-and-quality suite, with targeted exclusions for
# queries that produce inherent false positives in this security tool.
queries:
  - uses: security-and-quality

query-filters:
  # redact.py is a redaction tool — it must process sensitive file content by
  # design.  The alerts fire on rule-name strings and integer counts derived
  # from file reads, not on the actual secret values.  This is the same
  # reasoning that causes alerts #7-#9 to remain open on main.
  - exclude:
      id: py/clear-text-logging-sensitive-data

  - exclude:
      id: py/clear-text-storage-sensitive-data

  # serve.py is a localhost-only daemon (127.0.0.1 only).  User-supplied
  # command strings are validated by guard.py before reaching subprocess, and
  # the subprocess is always called with shell=False.  The uncontrolled-command-
  # line alert is a false positive for this local tool pattern.
  - exclude:
      id: py/command-line-injection
