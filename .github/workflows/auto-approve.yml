name: Auto-approve

# Calls the reusable workflow in aks-builds/workflows.
# Approves only PRs opened by aks-builds; silently skips all others.
#
# The reusable workflow supports two independent approver paths. Configure
# at least one — set both for two parallel approvals from distinct identities:
#
#   APPROVER_APP_ID + APPROVER_APP_PRIVATE_KEY  → approval posted by the bot App.
#   APPROVER_PAT                                → approval posted by the user
#                                                 who owns the PAT (typically
#                                                 a secondary GitHub account).
#
# Push secrets with workflows/scripts/distribute-secrets.ps1 in
# aks-builds/workflows.

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

# Required: a called workflow can never be granted more token scope than its
# caller. The reusable workflow requests `pull-requests: write` to post the
# approval, so the caller must grant it here. Without this block the caller
# inherits the repo's read-only default and the run dies at startup with
# "requesting 'pull-requests: write', but is only allowed 'pull-requests: none'".
permissions:
  contents: read
  pull-requests: write

jobs:
  call:
    uses: aks-builds/workflows/.github/workflows/auto-approve.yml@main
    secrets: inherit
