name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-matrix:
    name: test-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate manifests + run tests
        run: pytest -q

      - name: Smoke-test bundled scripts
        run: |
          python skills/cliproof/scripts/preflight.py --json
          python skills/cliproof/scripts/guard.py -- "echo hello"
          echo "AKIAIOSFODNN7EXAMPLE" | python skills/cliproof/scripts/redact.py - || test $? -eq 3

  # Stable aggregate gate. The matrix above produces per-version checks
  # ("test-matrix (3.10)", ...) whose names change as versions are added or
  # dropped; this single, fixed "test" check is what branch rules require, so
  # the required context never has to track the matrix.
  test:
    name: test
    needs: [test-matrix]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all matrix jobs to succeed
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "test-matrix result: ${{ needs.test-matrix.result }}"
            exit 1
          fi

  cli:
    name: cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Run CLI tests (agent-agnostic install + passthrough)
        run: npm test
