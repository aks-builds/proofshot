name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate manifests + run tests
        run: pytest -q

      - name: Smoke-test bundled scripts
        run: |
          python skills/proofshot/scripts/preflight.py --json
          python skills/proofshot/scripts/guard.py -- "echo hello"
          echo "AKIAIOSFODNN7EXAMPLE" | python skills/proofshot/scripts/redact.py - || test $? -eq 3
