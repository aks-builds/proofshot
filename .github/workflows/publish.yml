name: publish

# Post-merge half of the release pipeline. Fires when a release/* PR merges
# into main: publishes to npm with provenance, tags the commit, and cuts a
# GitHub release (which is what consumers of the Claude marketplace pin to).
# See release.yml for the prepare step and CONTRIBUTING.md § Releasing.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write   # tag + GitHub release
  id-token: write   # npm provenance (sigstore)

jobs:
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config user.name "aks-builds"
          git config user.email "its.aks@outlook.com"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release identifiers
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if printf '%s' "$VERSION" | grep -q -- '-'; then
            DISTTAG=alpha; PRERELEASE=true
          else
            DISTTAG=latest; PRERELEASE=false
          fi
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"        >> "$GITHUB_OUTPUT"
          echo "disttag=$DISTTAG"     >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Abort if tag already exists (idempotency guard)
        shell: bash
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.ver.outputs.tag }} already exists; nothing to do."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.ver.outputs.disttag }} --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Sync `latest` dist-tag (pre-1.0 alpha line)
        if: steps.ver.outputs.prerelease == 'true' && startsWith(steps.ver.outputs.version, '0.')
        run: npm dist-tag add cliproof@${{ steps.ver.outputs.version }} latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          awk -v ver="${{ steps.ver.outputs.version }}" '
            $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "Release ${{ steps.ver.outputs.version }}." > release-notes.md

      - name: Tag and push
        run: |
          set -euo pipefail
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          FLAG=""
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && FLAG="--prerelease"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file release-notes.md \
            --target main $FLAG
